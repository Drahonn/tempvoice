services:
  tempvoice:
    image: ghcr.io/drahonn/tempvoice:latest
    container_name: tempvoice-bot
    restart: unless-stopped
    volumes:
      - /opt/tempvoice/data:/app/data
    healthcheck:
      test: ["CMD", "node", "--eval", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
